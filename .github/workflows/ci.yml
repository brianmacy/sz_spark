name: ci

# Compiles and runs the FULL non-integration test suite (unit + concurrency + spark-local
# with a fake engine). It does NOT run SZ_IT=1 integration tests (those need a live Senzing
# engine + database) and never builds/publishes the FAT jar (no SDK redistribution).
#
# REQUIREMENT: the build compiles against the Senzing Java SDK jar, which is NOT on Maven
# Central. It is installed at CI time from Senzing's public apt repo (the "Install Senzing
# SDK (apt)" step below, mirroring the official senzing/senzingsdk-runtime Dockerfile) into
# $SENZING_DIR — it is never committed or redistributed. The compile step still fails fast
# if the jar is missing rather than compile against a stub.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SENZING_DIR: /opt/senzing
      # Accepting Senzing's EULA in Senzing's own CI to install the SDK non-interactively.
      SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
      # Pinned to the repo-registration package shipped by senzing/senzingsdk-runtime.
      SENZING_APT_REPOSITORY_NAME: senzingrepo_2.0.1-1_all.deb
      SENZING_APT_REPOSITORY_URL: https://senzing-production-apt.s3.amazonaws.com
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache sbt / ivy / coursier
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', 'project/**') }}

      # Install the Senzing SDK from Senzing's public apt repo at CI time (NOT committed —
      # no redistribution). Mirrors the official senzing/senzingsdk-runtime Dockerfile recipe;
      # installs to $SENZING_DIR (/opt/senzing). The FAT jar is still never built/published here.
      - name: Install Senzing SDK (apt)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install ca-certificates wget
          wget -O "/tmp/${SENZING_APT_REPOSITORY_NAME}" \
            "${SENZING_APT_REPOSITORY_URL}/${SENZING_APT_REPOSITORY_NAME}"
          sudo apt-get -y --no-install-recommends install "/tmp/${SENZING_APT_REPOSITORY_NAME}"
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install libpq5 senzingsdk-runtime jq

      # Fail loudly if the SDK jar is missing rather than compile against a stub.
      - name: Verify Senzing SDK is available
        run: |
          test -f "$SENZING_DIR/er/sdk/java/sz-sdk.jar" \
            || { echo "::error::Senzing SDK jar not found at $SENZING_DIR/er/sdk/java/sz-sdk.jar after apt install."; exit 1; }

      - name: Format check + full Spark test suite (excludes SZ_IT integration)
        run: sbt -v scalafmtCheckAll test
